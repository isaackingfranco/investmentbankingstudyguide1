<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Fundamentals — BIWS Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#080c14;color:#e0ddd6;min-height:100vh;line-height:1.6}
:root{
  --bg:#080c14;--surface:#0f1520;--surface2:#141c2e;--border:#1e2b42;
  --accent:#f0b429;--accent-dim:rgba(240,180,41,0.12);
  --text:#e0ddd6;--text-muted:#5a6a82;--text-dim:#8899aa;
  --success:#34d399;--success-dim:rgba(52,211,153,0.12);
  --error:#f87171;--error-dim:rgba(248,113,113,0.12);
  --radius:12px;--radius-sm:8px
}
.app{max-width:920px;margin:0 auto;padding:0 24px 80px}
/* HEADER */
.header{padding:44px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.header-eyebrow{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.header h1{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,40px);font-weight:800;color:#fff;line-height:1.1}
.header p{margin-top:10px;color:var(--text-dim);font-size:14px;max-width:520px}
/* SECTION NAV */
.section-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.section-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.section-btn:hover{border-color:var(--accent);color:var(--text)}
.section-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.section-btn .snum{font-family:'DM Mono',monospace;font-size:10px;opacity:.5}
/* SECTION HEADER */
.section-header{margin-bottom:24px}
.section-header h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff}
.section-header p{color:var(--text-dim);font-size:13px;margin-top:4px}
/* MODE TABS */
.mode-tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--surface);padding:4px;border-radius:var(--radius-sm);border:1px solid var(--border);width:fit-content}
.mode-tab{padding:8px 22px;border-radius:6px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .18s}
.mode-tab:hover{color:var(--text)}
.mode-tab.active{background:var(--surface2);color:var(--accent);border:1px solid var(--border)}
/* FLASHCARDS */
.flashcard-container{perspective:1200px;margin-bottom:24px;min-height:260px}
.flashcard{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border);padding:40px 44px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:260px}
.flashcard-front{background:var(--surface)}
.flashcard-back{background:var(--surface2);transform:rotateY(180deg)}
.flashcard-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.flashcard-term{font-family:'Syne',sans-serif;font-size:clamp(20px,3vw,26px);font-weight:700;color:#fff;line-height:1.25}
.flashcard-def{font-size:14px;color:var(--text);line-height:1.75;max-width:560px}
.flashcard-hint{margin-top:22px;font-size:12px;color:var(--text-muted)}
.fc-controls{display:flex;align-items:center;gap:16px;justify-content:center;margin-top:20px}
.fc-btn{padding:10px 26px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.fc-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-btn:disabled{opacity:.25;cursor:not-allowed}
.fc-progress{font-family:'DM Mono',monospace;font-size:13px;color:var(--text-muted);min-width:64px;text-align:center}
/* MATCHING */
.matching-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.matching-score{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted)}
.matching-reset{padding:6px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.matching-reset:hover{border-color:var(--accent);color:var(--accent)}
.matching-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.matching-col-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.match-item{padding:13px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s,color .15s,opacity .15s;line-height:1.5;margin-bottom:8px;user-select:none}
.match-item:hover:not(.matched){border-color:var(--accent);background:var(--accent-dim)}
.match-item.selected{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.match-item.matched{border-color:var(--success);background:var(--success-dim);color:var(--success);cursor:default;opacity:.65}
.match-item.wrong{border-color:var(--error);background:var(--error-dim);color:var(--error);animation:shake .4s ease}
.matching-complete{text-align:center;padding:32px;border-radius:var(--radius);background:var(--success-dim);border:1px solid var(--success);display:none;margin-top:20px}
.matching-complete.show{display:block}
.matching-complete h3{font-family:'Syne',sans-serif;font-size:20px;color:var(--success);margin-bottom:8px}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
/* QUIZ */
.quiz-progress-bar{height:2px;background:var(--border);border-radius:999px;margin-bottom:28px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .4s ease}
.quiz-question-num{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;text-transform:uppercase}
.quiz-question{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:24px}
.quiz-options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.quiz-option{padding:14px 18px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;line-height:1.5;cursor:pointer;transition:all .15s;text-align:left;display:flex;gap:12px;align-items:flex-start;font-family:'DM Sans',sans-serif;width:100%}
.quiz-option:hover:not(:disabled){border-color:var(--accent);background:var(--accent-dim)}
.opt-letter{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;flex-shrink:0;margin-top:2px;transition:all .15s}
.quiz-option.correct{border-color:var(--success);background:var(--success-dim)}
.quiz-option.correct .opt-letter{background:var(--success);border-color:var(--success);color:#000}
.quiz-option.wrong{border-color:var(--error);background:var(--error-dim)}
.quiz-option.wrong .opt-letter{background:var(--error);border-color:var(--error);color:#fff}
.quiz-option.dimmed{opacity:.35}
.quiz-option:disabled{cursor:default}
.quiz-explanation{margin-top:20px;padding:18px 20px;border-radius:var(--radius-sm);background:var(--surface2);border-left:3px solid var(--accent);font-size:13px;line-height:1.7;color:var(--text);display:none}
.quiz-explanation.show{display:block}
.quiz-explanation strong{color:#fff;font-weight:600}
.why-wrong-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.why-wrong-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px}
.why-wrong-item{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--text-dim);line-height:1.55}
.opt-ref{font-family:'DM Mono',monospace;font-size:10px;color:var(--error);background:var(--error-dim);border-radius:3px;padding:2px 5px;flex-shrink:0;height:fit-content;margin-top:2px}
.opt-ref.correct-ref{color:var(--success);background:var(--success-dim)}
.quiz-next{margin-top:20px;padding:11px 28px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:none}
.quiz-next.show{display:inline-block}
.quiz-next:hover{background:var(--accent);color:#000}
.quiz-complete{text-align:center;padding:44px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);display:none}
.quiz-complete.show{display:block}
.quiz-complete h3{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}
.quiz-score-display{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--accent);margin:16px 0}
.quiz-complete p{color:var(--text-dim);margin-bottom:24px}
.quiz-restart{padding:11px 28px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);font-size:13px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.quiz-restart:hover{background:var(--accent);color:#000}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:600px){
  .matching-grid{grid-template-columns:1fr}
  .section-nav{gap:6px}
  .section-btn{padding:8px 12px;font-size:12px}
  .flashcard-front,.flashcard-back{padding:28px 22px}
  .app{padding:0 16px 60px}
}
</style>
</head>

  <div id="sectionHeader" class="section-header"></div>
  <div class="mode-tabs" id="modeTabs"></div>
  <div id="content"></div>
</div>

const DATA = [
  {

      {front:'Financial Model',back:'A structured estimate — like a blueprint for a building — used to quantify future revenue, cash flows, and company value. Provides enough detail to support a decision without specifying every minor detail.'},

          {text:'A photograph showing exactly what a company looks like today',correct:false,explanation:'Models are forward-looking — they project the FUTURE, not document the present. A photograph captures what already happened.'},

          {text:'Your $200 thesis requires growth to TRIPLE — making your view very unlikely to be correct',correct:true,explanation:'Correct! Companies grow slower as they get bigger. A jump from 10% to 30% is implausible without extraordinary circumstances. The model is working correctly — it\'s revealing your assumption is flawed.'},

  {
    id:'tvm',

    subtitle:'Why a dollar today beats a dollar tomorrow',
    flashcards:[
      {front:'Time Value of Money',back:'Money today is worth MORE than the same amount in the future — because you could invest it today and earn a return.\n\nKey point: The reason is OPPORTUNITY COST, not primarily inflation. Even with zero inflation, TVM still applies.'},
      {front:'Present Value Formula',back:'PV = Future Value ÷ (1 + r)ⁿ\n\nHigher discount rate (r) → lower PV\nMore years (n) → lower PV\n\nExample: $150K in 2 years at 10%\n= $150K ÷ (1.10)² = $150K ÷ 1.21 ≈ $124K today'},

// ================================================================
// STATE
// ================================================================
let state = {
  sectionIndex: 0,
  mode: 'flashcards',
  fc: { index: 0, flipped: false },
  match: { terms:[], defs:[], selectedTermId:null, selectedDefId:null, matchedCount:0 },
  quiz: { index:0, answered:false, score:0, done:false }
};

// ================================================================
// HELPERS
// ================================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function currentSection() { return DATA[state.sectionIndex]; }

// ================================================================
// SECTION NAV
// ================================================================
function renderSectionNav() {
  document.getElementById('sectionNav').innerHTML = DATA.map((s, i) =>
    `<button class="section-btn ${i === state.sectionIndex ? 'active' : ''}" onclick="selectSection(${i})">
      <span class="snum">0${i+1}</span>${s.title}
    </button>`
  ).join('');
}

// ================================================================
// SECTION HEADER
// ================================================================
function renderSectionHeader() {
  const s = currentSection();
  document.getElementById('sectionHeader').innerHTML =
    `<h2>${s.title}</h2><p>${s.subtitle}</p>`;
}

// ================================================================
// MODE TABS
// ================================================================
function renderModeTabs() {
  const modes = [
    {id:'flashcards', label:'⬜ Flashcards'},
    {id:'matching',   label:'⇄ Matching'},
    {id:'quiz',       label:'✦ Quiz'}
  ];
  document.getElementById('modeTabs').innerHTML = modes.map(m =>
    `<button class="mode-tab ${state.mode===m.id ? 'active' : ''}" onclick="selectMode('${m.id}')">${m.label}</button>`
  ).join('');
}

// ================================================================
// FLASHCARDS
// ================================================================
function renderFlashcards() {
  const cards = currentSection().flashcards;
  const { index, flipped } = state.fc;
  const card = cards[index];
  const fmt = t => t.replace(/\n/g, '<br>');
  document.getElementById('content').innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard ${flipped ? 'flipped' : ''}" id="fc" onclick="flipCard()">
        <div class="flashcard-front">
          <div class="flashcard-label">Term / Concept</div>
          <div class="flashcard-term">${card.front}</div>
          <div class="flashcard-hint">Click to reveal →</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-label">Definition</div>
          <div class="flashcard-def">${fmt(card.back)}</div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" onclick="prevCard()" ${index===0?'disabled':''}>← Prev</button>
      <span class="fc-progress">${index+1} / ${cards.length}</span>
      <button class="fc-btn" onclick="nextCard()" ${index===cards.length-1?'disabled':''}>Next →</button>
    </div>`;
}

function flipCard() {
  state.fc.flipped = !state.fc.flipped;
  const fc = document.getElementById('fc');
  if (fc) fc.classList.toggle('flipped', state.fc.flipped);
}
function prevCard() {
  if (state.fc.index > 0) { state.fc.index--; state.fc.flipped = false; renderFlashcards(); }
}
function nextCard() {
  const n = currentSection().flashcards.length;
  if (state.fc.index < n - 1) { state.fc.index++; state.fc.flipped = false; renderFlashcards(); }
}

// ================================================================
// MATCHING  (no re-render on each click — pure DOM class updates)
// ================================================================
function initMatching() {
  const pairs = currentSection().matching;
  state.match = {
    terms: pairs.map((p,i) => ({id:i, text:p.term, matched:false, selected:false})),
    defs:  shuffle(pairs.map((p,i) => ({id:i, text:p.def,  matched:false, selected:false}))),
    selectedTermId: null,
    selectedDefId:  null,
    matchedCount: 0
  };
}

function renderMatching() {
  const { terms, defs, matchedCount } = state.match;
  const total = terms.length;
  const cls = (item, prefix) => {
    if (item.matched) return 'matched';
    if (item.selected) return 'selected';
    return '';
  };
  document.getElementById('content').innerHTML = `
    <div class="matching-header">
      <span class="matching-score" id="matchScore">${matchedCount} / ${total} matched</span>
      <button class="matching-reset" onclick="resetMatching()">Shuffle & Reset</button>
    </div>
    <div class="matching-grid">
      <div>
        <div class="matching-col-label">Terms</div>
        ${terms.map(t => `<div class="match-item ${cls(t,'term')}" id="term-${t.id}" onclick="selectTerm(${t.id})">${t.text}</div>`).join('')}
      </div>
      <div>
        <div class="matching-col-label">Definitions</div>
        ${defs.map(d => `<div class="match-item ${cls(d,'def')}" id="def-${d.id}" onclick="selectDef(${d.id})">${d.text}</div>`).join('')}
      </div>
    </div>
    <div class="matching-complete ${matchedCount===total?'show':''}" id="matchComplete">
      <h3>✓ All Matched!</h3>
      <p style="color:var(--text-dim);margin-top:8px;">You matched all ${total} pairs correctly.</p>
      <button class="matching-reset" style="margin-top:16px;" onclick="resetMatching()">Play Again →</button>
    </div>`;
}

function selectTerm(id) {
  const { terms } = state.match;
  const term = terms.find(t => t.id === id);
  if (!term || term.matched) return;

  // Deselect previous term if different
  if (state.match.selectedTermId !== null && state.match.selectedTermId !== id) {
    const prevT = terms.find(t => t.id === state.match.selectedTermId);
    if (prevT) prevT.selected = false;
    const prevEl = document.getElementById(`term-${state.match.selectedTermId}`);
    if (prevEl) prevEl.classList.remove('selected');
  }

  if (state.match.selectedTermId === id) {
    // Deselect
    term.selected = false;
    state.match.selectedTermId = null;
    const el = document.getElementById(`term-${id}`);
    if (el) el.classList.remove('selected');
  } else {
    term.selected = true;
    state.match.selectedTermId = id;
    const el = document.getElementById(`term-${id}`);
    if (el) el.classList.add('selected');
    if (state.match.selectedDefId !== null) tryMatch();
  }
}

function selectDef(id) {
  const { defs } = state.match;
  const def = defs.find(d => d.id === id);
  if (!def || def.matched) return;

  // Deselect previous def if different
  if (state.match.selectedDefId !== null && state.match.selectedDefId !== id) {
    const prevD = defs.find(d => d.id === state.match.selectedDefId);
    if (prevD) prevD.selected = false;
    const prevEl = document.getElementById(`def-${state.match.selectedDefId}`);
    if (prevEl) prevEl.classList.remove('selected');
  }

  if (state.match.selectedDefId === id) {
    // Deselect
    def.selected = false;
    state.match.selectedDefId = null;
    const el = document.getElementById(`def-${id}`);
    if (el) el.classList.remove('selected');
  } else {
    def.selected = true;
    state.match.selectedDefId = id;
    const el = document.getElementById(`def-${id}`);
    if (el) el.classList.add('selected');
    if (state.match.selectedTermId !== null) tryMatch();
  }
}

function tryMatch() {
  const termId = state.match.selectedTermId;
  const defId  = state.match.selectedDefId;
  if (termId === null || defId === null) return;

  const termEl = document.getElementById(`term-${termId}`);
  const defEl  = document.getElementById(`def-${defId}`);
  const term   = state.match.terms.find(t => t.id === termId);
  const def    = state.match.defs.find(d => d.id === defId);

  if (termId === defId) {
    // CORRECT
    if (term) { term.matched = true; term.selected = false; }
    if (def)  { def.matched  = true; def.selected  = false; }
    if (termEl) { termEl.classList.remove('selected'); termEl.classList.add('matched'); }
    if (defEl)  { defEl.classList.remove('selected');  defEl.classList.add('matched'); }
    state.match.selectedTermId = null;
    state.match.selectedDefId  = null;
    state.match.matchedCount++;
    const scoreEl = document.getElementById('matchScore');
    if (scoreEl) scoreEl.textContent = `${state.match.matchedCount} / ${state.match.terms.length} matched`;
    if (state.match.matchedCount === state.match.terms.length) {
      const c = document.getElementById('matchComplete');
      if (c) c.classList.add('show');
    }
  } else {
    // WRONG
    if (termEl) { termEl.classList.remove('selected'); termEl.classList.add('wrong'); }
    if (defEl)  { defEl.classList.remove('selected');  defEl.classList.add('wrong'); }
    if (term) term.selected = false;
    if (def)  def.selected  = false;
    state.match.selectedTermId = null;
    state.match.selectedDefId  = null;
    setTimeout(() => {
      if (termEl) termEl.classList.remove('wrong');
      if (defEl)  defEl.classList.remove('wrong');
    }, 620);
  }
}

function resetMatching() {
  initMatching();
  renderMatching();
}

// ================================================================
// QUIZ
// ================================================================
function initQuiz() {
  state.quiz = { index:0, answered:false, score:0, done:false };
}

function renderQuiz() {
  const questions = currentSection().quiz;
  const { index, score, done } = state.quiz;
  const letters = ['A','B','C','D'];

  if (done) {
    const pct = Math.round((score / questions.length) * 100);
    document.getElementById('content').innerHTML = `
      <div class="quiz-complete show">
        <h3>Quiz Complete</h3>
        <div class="quiz-score-display">${score}/${questions.length}</div>
        <p>You answered <strong>${score}</strong> out of <strong>${questions.length}</strong> correctly (${pct}%).</p>
        <button class="quiz-restart" onclick="restartQuiz()">Try Again</button>
      </div>`;
    return;
  }

  const q = questions[index];
  const progress = (index / questions.length) * 100;

  document.getElementById('content').innerHTML = `
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" style="width:${progress}%"></div>
    </div>
    <div class="quiz-question-num">Question ${index+1} of ${questions.length}</div>
    <div class="quiz-question">${q.question}</div>
    <div class="quiz-options" id="quizOptions">
      ${q.options.map((opt,i) => `
        <button class="quiz-option" id="opt-${i}" onclick="answerQuiz(${i})">
          <span class="opt-letter">${letters[i]}</span>
          <span>${opt.text}</span>
        </button>`).join('')}
    </div>
    <div class="quiz-explanation" id="quizExplanation"></div>
    <button class="quiz-next" id="quizNext" onclick="nextQuestion()">
      ${index === questions.length - 1 ? 'See Results →' : 'Next Question →'}
    </button>`;
}

function answerQuiz(chosenIdx) {
  if (state.quiz.answered) return;
  state.quiz.answered = true;

  const questions = currentSection().quiz;
  const q = questions[state.quiz.index];
  const letters = ['A','B','C','D'];
  const chosen = q.options[chosenIdx];

  if (chosen.correct) state.quiz.score++;

  // Style options
  q.options.forEach((opt, i) => {
    const btn = document.getElementById(`opt-${i}`);
    if (!btn) return;
    btn.disabled = true;
    if (opt.correct)         btn.classList.add('correct');
    else if (i === chosenIdx) btn.classList.add('wrong');
    else                      btn.classList.add('dimmed');
  });

  // Build explanation
  const resultColor = chosen.correct ? 'var(--success)' : 'var(--error)';
  const resultLabel = chosen.correct ? '✓ Correct!' : '✗ Incorrect';

  const wrongItems = q.options
    .map((opt, i) => ({ opt, i }))
    .filter(({opt}) => !opt.correct)
    .map(({opt, i}) => `
      <div class="why-wrong-item">
        <span class="opt-ref">${letters[i]}</span>
        <span>${opt.explanation}</span>
      </div>`).join('');

  const correctItem = q.options
    .map((opt, i) => ({opt, i}))
    .filter(({opt}) => opt.correct)
    .map(({opt, i}) => `
      <div class="why-wrong-item">
        <span class="opt-ref correct-ref">${letters[i]}</span>
        <span>${opt.explanation}</span>
      </div>`).join('');

  const expEl = document.getElementById('quizExplanation');
  if (expEl) {
    expEl.innerHTML = `
      <strong style="color:${resultColor}">${resultLabel}</strong>
      ${!chosen.correct
        ? ` — ${chosen.explanation}
            <div class="why-wrong-section">
              <div class="why-wrong-label">Correct Answer</div>
              ${correctItem}
              <div class="why-wrong-label" style="margin-top:12px;">Why the other options are wrong</div>
              ${wrongItems}
            </div>`
        : ` — ${chosen.explanation}
            <div class="why-wrong-section">
              <div class="why-wrong-label">Why the other options are wrong</div>
              ${wrongItems}
            </div>`
      }`;
    expEl.classList.add('show');
  }

  const nextEl = document.getElementById('quizNext');
  if (nextEl) nextEl.classList.add('show');
}

function nextQuestion() {
  const n = currentSection().quiz.length;
  if (state.quiz.index >= n - 1) {
    state.quiz.done = true;
    renderQuiz();
  } else {
    state.quiz.index++;
    state.quiz.answered = false;
    renderQuiz();
  }
}

function restartQuiz() {
  initQuiz();
  renderQuiz();
}

// ================================================================
// NAVIGATION
// ================================================================
function selectSection(i) {
  state.sectionIndex = i;
  state.mode = 'flashcards';
  state.fc = { index:0, flipped:false };
  initMatching();
  initQuiz();
  renderAll();
}

function selectMode(mode) {
  state.mode = mode;
  renderModeTabs();
  renderContent();
}

function renderContent() {
  if (state.mode === 'flashcards')    renderFlashcards();
  else if (state.mode === 'matching') renderMatching();
  else if (state.mode === 'quiz')     renderQuiz();
}

function renderAll() {
  renderSectionNav();
  renderSectionHeader();
  renderModeTabs();
  renderContent();
}

// ================================================================
// INIT
// ================================================================
initMatching();
initQuiz();
renderAll();
</script>
